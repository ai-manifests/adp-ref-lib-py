name: Build and Publish Python Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: linux
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git checkout ${{ github.sha }}

      - name: Verify Python + create build venv
        run: |
          python3 --version
          python3 -m venv /tmp/build-venv
          /tmp/build-venv/bin/pip install --upgrade pip build twine

      - name: Build adp-manifest
        run: /tmp/build-venv/bin/python -m build

      - name: Publish to Gitea PyPI
        env:
          TWINE_USERNAME: gitea
          TWINE_PASSWORD: ${{ secrets.GITEATOKEN }}
        run: |
          # Gitea's PyPI rejects --skip-existing as an "unsupported
          # configuration," so we detect "already exists" errors in the
          # output instead. Re-running against an existing tag is safe.
          set +e
          /tmp/build-venv/bin/python -m twine upload \
            --repository-url https://git.marketally.com/api/packages/ai-manifests/pypi \
            --non-interactive \
            dist/* \
            2>&1 | tee /tmp/gitea-upload.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            if grep -qiE "already exists|file already|version already" /tmp/gitea-upload.log; then
              echo "::notice::Gitea PyPI upload skipped: version already published"
              exit 0
            fi
            exit "$STATUS"
          fi

      - name: Publish to public PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          # Public PyPI is append-only and permanent — a version can never
          # be replaced, only yanked. Tag-gated so workflow_dispatch retries
          # don't attempt a re-upload and fail the whole workflow.
          /tmp/build-venv/bin/python -m twine upload \
            --non-interactive \
            dist/*
